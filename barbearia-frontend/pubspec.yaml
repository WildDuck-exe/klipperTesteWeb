name: barbearia_frontend
description: Aplicativo de agendamento para barbearia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  url_launcher: ^6.2.1
  google_fonts: ^6.1.0
  animations: ^2.0.11
  flutter_spinkit: ^5.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/layout/
