<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Navigation Menu</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/6.1.3/onsen-ui.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
    }

    .navigation {
      position: relative;
      width: 360px;
      height: 72px;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .navigation ul {
      display: flex;
      width: 100%;
      height: 100%;
      list-style: none;
      position: relative;
    }

    .navigation ul li {
      position: static;
      z-index: 2;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .navigation ul li a {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      text-decoration: none;
      z-index: 2;
      border-radius: 50%;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .navigation ul li a:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: scale(1.05);
    }

    .navigation ul li a .icon {
      font-size: 24px;
      color: #94a3b8;
      transition: all 0.3s ease;
    }

    /* Ícone ativo: muda cor e escala */
    .navigation ul li.active a .icon {
      color: #f97316;
      transform: scale(1.15);
    }

    .navigation ul li.active a {
      background: rgba(249, 115, 22, 0.15);
    }

    /* Indicador: o círculo flutuante no topo */
    .indicator {
      position: absolute;
      top: 8px;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border-radius: 50%;
      z-index: 1;
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.4);
    }
  </style>
</head>
<body>

  <nav class="navigation">
    <ul>
      <!-- Item 1: Home -->
      <li class="active">
        <a href="#" onclick="setActive(this.parentElement, 0); return false;">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
          </span>
        </a>
        <div class="indicator"></div>
      </li>

      <!-- Item 2: Search -->
      <li>
        <a href="#" onclick="setActive(this.parentElement, 1); return false;">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
        </a>
        <div class="indicator"></div>
      </li>

      <!-- Item 3: Add (centro destacado) -->
      <li>
        <a href="#" onclick="setActive(this.parentElement, 2); return false;">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
          </span>
        </a>
        <div class="indicator"></div>
      </li>

      <!-- Item 4: Heart -->
      <li>
        <a href="#" onclick="setActive(this.parentElement, 3); return false;">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </span>
        </a>
        <div class="indicator"></div>
      </li>

      <!-- Item 5: User (Perfil) -->
      <li>
        <a href="#" onclick="setActive(this.parentElement, 4); return false;">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </span>
        </a>
        <div class="indicator"></div>
      </li>
    </ul>
  </nav>

  <script>
    function setActive(li, index) {
      // Remove active de todos
      document.querySelectorAll('.navigation ul li').forEach(item => {
        item.classList.remove('active');
      });

      // Ativa o clicado
      li.classList.add('active');

      // Move o indicador
      const indicator = li.querySelector('.indicator');
      const itemWidth = 72; // cada li ocupa 72px (360px / 5)
      indicator.style.transform = `translateX(${index * itemWidth}px)`;
    }

    // Inicializa a posição do indicador
    document.addEventListener('DOMContentLoaded', () => {
      const indicator = document.querySelector('.navigation ul li.active .indicator');
      if (indicator) {
        const activeIndex = [...document.querySelectorAll('.navigation ul li')].findIndex(
          li => li.classList.contains('active')
        );
        indicator.style.transform = `translateX(${activeIndex * 72}px)`;
      }
    });
  </script>

</body>
</html>
